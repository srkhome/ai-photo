<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宜仁居家 - AI 實體影片生成器</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .spinner { border: 4px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top: 4px solid #2563eb; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* 優化 Placeholder 的顏色 */
        ::placeholder { color: #94a3b8; opacity: 1; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center py-12 px-4 text-slate-800">

    <div class="max-w-3xl w-full bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- 頂部品牌區 -->
        <div class="bg-blue-900 text-white p-8 text-center">
            <h1 class="text-3xl font-extrabold tracking-wider">宜仁居家有限公司</h1>
            <p class="text-blue-200 mt-2 font-medium tracking-widest">AI 影片生成講師專屬工具 ｜ TEL: 0919821208</p>
        </div>

        <!-- 互動區 -->
        <div class="p-8">
            <!-- 步驟一：上傳與設定 -->
            <div id="step-upload" class="text-center">
                <h2 class="text-2xl font-bold mb-2">自動影片後製與錄製系統</h2>
                <p class="text-slate-500 mb-6">照片固定 10 秒，影片最高 20 秒，自動生成 3D 翻頁直式影片。</p>
                
                <label class="block w-full cursor-pointer bg-slate-50 border-2 border-dashed border-blue-300 hover:border-blue-500 hover:bg-blue-50 transition-all p-12 rounded-xl group mb-4">
                    <div class="flex flex-col items-center">
                        <svg class="w-12 h-12 text-blue-500 group-hover:text-blue-600 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        <span id="file-label" class="text-blue-700 font-bold text-lg">點擊選擇多個內頁媒體檔案</span>
                    </div>
                    <input type="file" id="file-input" class="hidden" accept="image/*,video/*" multiple />
                </label>
                
                <!-- 自訂封面圖片 -->
                <div class="mb-8 bg-indigo-50 p-6 rounded-xl border border-indigo-200 text-left">
                    <h3 class="text-lg font-bold text-indigo-900 mb-2 border-b border-indigo-200 pb-2">🖼️ 自訂首頁封面圖 <span class="text-sm text-indigo-600 font-normal">（選填）</span></h3>
                    <input type="file" id="cover-input" accept="image/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-indigo-600 file:text-white cursor-pointer mt-2">
                </div>

                <!-- 品牌與標題資訊：預設空白，使用 Placeholder 提示 -->
                <div class="mb-8 bg-slate-50 p-6 rounded-xl border border-slate-200 text-left">
                    <h3 class="text-lg font-bold text-slate-800 mb-4 border-b border-slate-200 pb-2">📝 設定品牌與標題資訊</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">封面大標題 (影片主題)</label>
                            <input type="text" id="input-maintitle" class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-400" placeholder="ＡＩ作品集">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">公司或品牌名稱</label>
                            <input type="text" id="input-company" class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-400" placeholder="宜仁居家有限公司">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">聯絡電話</label>
                            <input type="text" id="input-phone" class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-400" placeholder="0919-821208">
                        </div>
                    </div>
                </div>

                <!-- 背景音樂 -->
                <div id="bgm-input-container" class="hidden mb-8 bg-blue-50 p-6 rounded-xl border border-blue-200 text-left">
                    <h3 class="text-lg font-bold text-blue-900 mb-2 border-b border-blue-200 pb-2">🎵 加入背景音樂</h3>
                    <input type="file" id="bgm-input" accept="audio/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:bg-blue-600 file:text-white cursor-pointer mt-2">
                    <div class="mt-4 flex items-center gap-3">
                        <label class="text-sm font-medium text-slate-700 whitespace-nowrap">音樂音量：</label>
                        <input type="range" id="bgm-volume" min="0" max="1" step="0.05" value="0.2" class="w-full h-2 bg-blue-200 rounded-lg appearance-none cursor-pointer">
                        <span id="volume-label" class="text-sm text-slate-600 font-bold w-12 text-right">20%</span>
                    </div>
                </div>

                <button id="btn-generate" class="hidden mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl transition-colors shadow-lg">▶ 開始渲染並錄製實體影片</button>
            </div>

            <!-- 步驟二：處理中畫面 -->
            <div id="step-processing" class="hidden flex-col items-center justify-center py-12">
                <div class="spinner mb-4"></div>
                <h3 class="text-xl font-bold text-blue-900 mb-2">正在為您錄製影片...</h3>
                <div class="w-full max-w-sm mx-auto aspect-[210/297] bg-black rounded-lg overflow-hidden shadow-inner relative">
                    <canvas id="render-canvas" class="w-full h-full object-contain" width="1080" height="1528"></canvas>
                </div>
            </div>

            <!-- 步驟三：下載畫面 -->
            <div id="step-download" class="hidden text-center py-8">
                <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h3 class="text-2xl font-bold text-slate-800 mb-2">影片錄製完成！</h3>
                <a id="download-link" href="#" class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-10 rounded-xl transition-colors shadow-lg mb-4">📥 下載影片檔案 (.webm)</a>
                <br><button onclick="location.reload()" class="text-slate-500 text-sm underline mt-4">重新製作</button>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const fileLabel = document.getElementById('file-label');
        const btnGenerate = document.getElementById('btn-generate');
        const canvas = document.getElementById('render-canvas');
        const ctx = canvas.getContext('2d');
        let mediaElements = [], bgmElement = null, coverImageElement = null, audioCtx = null;
        let currentCompanyName = "", currentPhone = "", currentMainTitle = "";

        document.getElementById('cover-input').onchange = (e) => {
            const file = e.target.files[0];
            if (file) { const img = new Image(); img.src = URL.createObjectURL(file); img.onload = () => coverImageElement = img; }
        };
        document.getElementById('bgm-volume').oninput = (e) => document.getElementById('volume-label').textContent = `${Math.round(e.target.value * 100)}%`;
        document.getElementById('bgm-input').onchange = (e) => {
            const file = e.target.files[0];
            if (file) bgmElement = new Audio(URL.createObjectURL(file));
        };

        fileInput.onchange = async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            fileLabel.textContent = `已準備好 ${files.length} 個媒體檔案`;
            document.getElementById('bgm-input-container').classList.remove('hidden');
            mediaElements = await Promise.all(files.map(file => {
                return new Promise((resolve) => {
                    const url = URL.createObjectURL(file);
                    if (file.type.startsWith('video/')) {
                        const video = document.createElement('video');
                        video.src = url; video.muted = true; video.loop = true; video.playsInline = true;
                        video.setAttribute('playsinline', '');
                        video.onloadedmetadata = () => resolve({ type: 'video', el: video, duration: Math.min(video.duration || 5, 20) });
                        setTimeout(() => resolve({ type: 'video', el: video, duration: 5 }), 2000);
                        video.load();
                    } else {
                        const img = new Image(); img.src = url;
                        img.onload = () => resolve({ type: 'image', el: img, duration: 10 });
                        setTimeout(() => resolve({ type: 'image', el: img, duration: 10 }), 2000);
                    }
                });
            }));
            btnGenerate.classList.remove('hidden');
        };

        btnGenerate.onclick = async () => {
            // 讀取輸入值，若為空則使用預設提示字串作為後備
            currentCompanyName = document.getElementById('input-company').value.trim() || "宜仁居家有限公司";
            currentPhone = document.getElementById('input-phone').value.trim() || "0919-821208";
            currentMainTitle = document.getElementById('input-maintitle').value.trim() || "ＡＩ作品集";
            
            document.getElementById('step-upload').classList.add('hidden');
            document.getElementById('step-processing').classList.remove('hidden');
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const audioDest = audioCtx.createMediaStreamDestination();
            if (bgmElement) {
                const bgmSource = audioCtx.createMediaElementSource(bgmElement);
                const gain = audioCtx.createGain(); gain.gain.value = parseFloat(document.getElementById('bgm-volume').value);
                bgmSource.connect(gain); gain.connect(audioDest); gain.connect(audioCtx.destination);
                bgmElement.loop = true; bgmElement.play().catch(e => console.log(e));
            }
            mediaElements.forEach(m => {
                if (m.type === 'video') { 
                    try {
                        const s = audioCtx.createMediaElementSource(m.el); 
                        s.connect(audioDest); s.connect(audioCtx.destination); 
                        m.el.muted = false; 
                    } catch(e) {}
                }
            });

            const stream = canvas.captureStream(30);
            const recorder = new MediaRecorder(new MediaStream([...stream.getVideoTracks(), ...audioDest.stream.getAudioTracks()]), { mimeType: 'video/webm;codecs=vp9' });
            const chunks = []; recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                document.getElementById('download-link').href = URL.createObjectURL(blob);
                document.getElementById('download-link').download = `${currentMainTitle}.webm`;
                document.getElementById('step-processing').classList.add('hidden');
                document.getElementById('step-download').classList.remove('hidden');
            };
            recorder.start();

            await renderBookCover(currentMainTitle, currentCompanyName, "影像與聲音創作集", "", 2500, false);
            for (let i = 0; i < mediaElements.length; i++) {
                if (mediaElements[i].type === 'video') mediaElements[i].el.play().catch(e => console.log(e));
                await renderMediaContent(mediaElements[i], mediaElements[i].duration * 1000);
                if (mediaElements[i].type === 'video') mediaElements[i].el.pause();
                if (i < mediaElements.length - 1) await renderTransition(mediaElements[i], mediaElements[i+1], 1200);
            }
            await renderBookCover("感謝觀賞", `${currentCompanyName} / TEL: ${currentPhone}`, "來電詢問就送個人專屬影片一隻", "", 3000, true);
            recorder.stop();
        };

        async function renderBookCover(mainTitle, subTitle, smallTitle, footerText, durationMs, isBack) {
            const start = performance.now();
            return new Promise(res => {
                function draw(now) {
                    const p = Math.min(1, (now - start) / 500);
                    if (!isBack && coverImageElement) {
                        const r = coverImageElement.width / coverImageElement.height, cr = canvas.width / canvas.height;
                        let dw = canvas.width, dh = canvas.height, dx = 0, dy = 0;
                        if (r > cr) { dw = canvas.height * r; dx = (canvas.width - dw) / 2; } else { dh = canvas.width / r; dy = (canvas.height - dh) / 2; }
                        ctx.drawImage(coverImageElement, dx, dy, dw, dh);
                        ctx.fillStyle = 'rgba(15, 23, 42, 0.6)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    } else {
                        const g = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                        g.addColorStop(0, '#1e3a8a'); g.addColorStop(1, '#0f172a'); ctx.fillStyle = g; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    }
                    const sw = 100, sg = ctx.createLinearGradient(isBack ? canvas.width - sw : 0, 0, isBack ? canvas.width : sw, 0);
                    sg.addColorStop(0, 'rgba(0,0,0,0.9)'); sg.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = sg; ctx.fillRect(isBack ? canvas.width - sw : 0, 0, sw, canvas.height);

                    ctx.strokeStyle = 'rgba(251, 191, 36, 0.7)'; ctx.lineWidth = 6; const m = 80, rx = isBack ? m : m + 30, rw = canvas.width - m * 2 - 30;
                    ctx.strokeRect(rx, m, rw, canvas.height - m * 2);
                    ctx.lineWidth = 2; ctx.strokeRect(rx + 20, m + 20, rw - 40, canvas.height - m * 2 - 40);

                    ctx.globalAlpha = p; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.shadowColor = 'rgba(0,0,0,0.9)'; ctx.shadowBlur = 12; ctx.shadowOffsetX = 4; ctx.shadowOffsetY = 4;
                    const tx = isBack ? canvas.width / 2 - 15 : canvas.width / 2 + 15;
                    const cy = canvas.height / 2;

                    ctx.font = 'bold 120px serif'; ctx.fillStyle = 'white'; ctx.fillText(mainTitle, tx, cy - 40);
                    ctx.font = '65px serif'; ctx.fillStyle = '#fcd34d'; ctx.fillText(subTitle, tx, cy + 110);
                    ctx.font = '40px serif'; ctx.fillStyle = '#fcd34d'; ctx.fillText(smallTitle, tx, cy + 200);
                    if (footerText) { ctx.font = '32px serif'; ctx.fillStyle = 'white'; ctx.fillText(footerText, tx, cy + 280); }

                    ctx.globalAlpha = 1; ctx.shadowColor = 'transparent';
                    if (now - start < durationMs) requestAnimationFrame(draw); else res();
                }
                requestAnimationFrame(draw);
            });
        }

        async function renderMediaContent(media, dur) {
            const start = performance.now();
            return new Promise(res => {
                function draw(now) {
                    ctx.fillStyle = 'black'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    const r = Math.min(canvas.width / (media.type === 'video' ? media.el.videoWidth : media.el.width), canvas.height / (media.type === 'video' ? media.el.videoHeight : media.el.height));
                    const dw = (media.type === 'video' ? media.el.videoWidth : media.el.width) * r, dh = (media.type === 'video' ? media.el.videoHeight : media.el.height) * r;
                    ctx.drawImage(media.el, (canvas.width - dw) / 2, (canvas.height - dh) / 2, dw, dh);
                    ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.font = '24px sans-serif'; ctx.textAlign = 'right'; 
                    ctx.fillText(`${currentCompanyName} AI 影片生成`, canvas.width - 20, canvas.height - 20);
                    if (now - start < dur) requestAnimationFrame(draw); else res();
                }
                requestAnimationFrame(draw);
            });
        }

        async function renderTransition(m1, m2, dur) {
            const start = performance.now();
            return new Promise(res => {
                function draw(now) {
                    const p = Math.min(1, (now - start) / dur), ep = 1 - Math.pow(1 - p, 3);
                    ctx.fillStyle = 'black'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    const r2 = Math.min(canvas.width / (m2.type === 'video' ? m2.el.videoWidth : m2.el.width), canvas.height / (m2.type === 'video' ? m2.el.videoHeight : m2.el.height));
                    ctx.drawImage(m2.el, (canvas.width - (m2.type === 'video' ? m2.el.videoWidth : m2.el.width) * r2) / 2, (canvas.height - (m2.type === 'video' ? m2.el.videoHeight : m2.el.height) * r2) / 2, (m2.type === 'video' ? m2.el.videoWidth : m2.el.width) * r2, (m2.type === 'video' ? m2.el.videoHeight : m2.el.height) * r2);
                    if (ep < 1) {
                        ctx.save(); ctx.scale(1 - ep, 1);
                        const r1 = Math.min(canvas.width / (m1.type === 'video' ? m1.el.videoWidth : m1.el.width), canvas.height / (m1.type === 'video' ? m1.el.videoHeight : m1.el.height));
                        ctx.drawImage(m1.el, (canvas.width - (m1.type === 'video' ? m1.el.videoWidth : m1.el.width) * r1) / 2, (canvas.height - (m1.type === 'video' ? m1.el.videoHeight : m1.el.height) * r1) / 2, (m1.type === 'video' ? m1.el.videoWidth : m1.el.width) * r1, (m1.type === 'video' ? m1.el.videoHeight : m1.el.height) * r1);
                        ctx.fillStyle = `rgba(0,0,0,${ep * 0.8})`; ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.restore();
                    }
                    if (now - start < dur) requestAnimationFrame(draw); else res();
                }
                requestAnimationFrame(draw);
            });
        }
    </script>
</body>
</html>
