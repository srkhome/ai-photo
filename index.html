<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宜仁居家 - AI 實體影片生成器</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .spinner { border: 4px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top: 4px solid #2563eb; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center py-12 px-4 text-slate-800">

    <div class="max-w-3xl w-full bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- 頂部品牌區 -->
        <div class="bg-blue-900 text-white p-8 text-center">
            <h1 class="text-3xl font-extrabold tracking-wider">宜仁居家有限公司</h1>
            <p class="text-blue-200 mt-2 font-medium tracking-widest">AI 影片生成講師專屬工具 ｜ TEL: 0919821208</p>
        </div>

        <!-- 互動區 -->
        <div class="p-8">
            <!-- 步驟一：上傳與設定 -->
            <div id="step-upload" class="text-center">
                <h2 class="text-2xl font-bold mb-2">自動影片後製與錄製系統</h2>
                <p class="text-slate-500 mb-6">請上傳您的照片或短影片素材，系統將自動為您生成帶有 3D 翻頁特效的專屬直式短影音。</p>
                
                <label class="block w-full cursor-pointer bg-slate-50 border-2 border-dashed border-blue-300 hover:border-blue-500 hover:bg-blue-50 transition-all p-12 rounded-xl group mb-4">
                    <div class="flex flex-col items-center">
                        <svg class="w-12 h-12 text-blue-500 group-hover:text-blue-600 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        <span id="file-label" class="text-blue-700 font-bold text-lg">點擊選擇多個媒體檔案</span>
                    </div>
                    <input type="file" id="file-input" class="hidden" accept="image/*,video/*" multiple />
                </label>
                <p id="error-msg" class="text-red-500 text-sm font-bold min-h-[20px]"></p>
                
                <!-- 品牌資訊輸入區 -->
                <div class="mb-8 bg-slate-50 p-6 rounded-xl border border-slate-200 text-left">
                    <h3 class="text-lg font-bold text-slate-800 mb-4 border-b border-slate-200 pb-2">📝 設定品牌資訊</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">公司或品牌名稱 (顯示於片頭與浮水印)</label>
                            <input type="text" id="input-company" class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-400" value="宜仁居家有限公司">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">聯絡電話 (顯示於片尾)</label>
                            <input type="text" id="input-phone" class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-400" value="0919821208">
                        </div>
                    </div>
                </div>

                <!-- 背景音樂輸入區 -->
                <div id="bgm-input-container" class="hidden mb-8 bg-blue-50 p-6 rounded-xl border border-blue-200 text-left">
                    <h3 class="text-lg font-bold text-blue-900 mb-2 border-b border-blue-200 pb-2">🎵 加入背景音樂 <span class="text-sm text-blue-600 font-normal">（選填）</span></h3>
                    <input type="file" id="bgm-input" accept="audio/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer mt-2">
                    
                    <div class="mt-4 flex items-center gap-3">
                        <label class="text-sm font-medium text-slate-700 whitespace-nowrap">音樂音量：</label>
                        <input type="range" id="bgm-volume" min="0" max="1" step="0.05" value="0.5" class="w-full h-2 bg-blue-200 rounded-lg appearance-none cursor-pointer">
                        <span id="volume-label" class="text-sm text-slate-600 font-bold w-12 text-right">50%</span>
                    </div>
                </div>

                <button id="btn-generate" class="hidden mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl transition-colors shadow-lg">
                    ▶ 開始渲染並錄製實體影片
                </button>
            </div>

            <!-- 步驟二：處理中畫面 -->
            <div id="step-processing" class="hidden flex-col items-center justify-center py-12">
                <div class="spinner mb-4"></div>
                <h3 class="text-xl font-bold text-blue-900 mb-2">正在為您錄製影片...</h3>
                <p class="text-slate-500 text-sm mb-6">請勿關閉視窗，正在進行 Canvas 逐格渲染與編碼</p>
                
                <!-- A4 直立比例預覽畫布 -->
                <div class="w-full max-w-sm mx-auto aspect-[210/297] bg-black rounded-lg overflow-hidden shadow-inner relative">
                    <canvas id="render-canvas" class="w-full h-full object-contain" width="1080" height="1528"></canvas>
                </div>
            </div>

            <!-- 步驟三：下載畫面 -->
            <div id="step-download" class="hidden text-center py-8">
                <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h3 class="text-2xl font-bold text-slate-800 mb-2">影片錄製完成！</h3>
                <p class="text-slate-500 mb-8">您的專屬 A4 展示影片已成功生成。</p>
                
                <a id="download-link" href="#" class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-10 rounded-xl transition-colors shadow-lg mb-4">
                    📥 下載影片檔案 (.webm)
                </a>
                <br>
                <button onclick="location.reload()" class="text-slate-500 hover:text-slate-700 text-sm underline mt-4">
                    重新製作其他影片
                </button>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const fileLabel = document.getElementById('file-label');
        const errorMsg = document.getElementById('error-msg');
        const btnGenerate = document.getElementById('btn-generate');
        const stepUpload = document.getElementById('step-upload');
        const stepProcessing = document.getElementById('step-processing');
        const stepDownload = document.getElementById('step-download');
        const canvas = document.getElementById('render-canvas');
        const ctx = canvas.getContext('2d');
        
        let mediaElements = [];
        let bgmElement = null; 
        let audioCtx = null;   
        
        let currentCompanyName = "宜仁居家有限公司";
        let currentPhone = "0919821208";

        // 更新音量拉桿數值顯示
        document.getElementById('bgm-volume').addEventListener('input', (e) => {
            document.getElementById('volume-label').textContent = `${Math.round(e.target.value * 100)}%`;
        });

        // 處理背景音樂選擇
        document.getElementById('bgm-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                bgmElement = new Audio(URL.createObjectURL(file));
            } else {
                bgmElement = null;
            }
        });

        // 處理主要素材檔案選擇
        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            errorMsg.textContent = "";
            btnGenerate.classList.add('hidden');
            document.getElementById('bgm-input-container').classList.add('hidden');
            
            // 解除數量限制，僅驗證是否為空
            if (files.length === 0) {
                errorMsg.textContent = `請至少選擇 1 個以上的檔案`;
                fileLabel.textContent = `尚未選擇檔案`;
                return;
            }
            
            fileLabel.textContent = `已準備好 ${files.length} 個媒體檔案，可開始生成`;
            document.getElementById('bgm-input-container').classList.remove('hidden');
            
            try {
                // 將檔案轉換為可播放/繪製的 HTML 元素
                mediaElements = await Promise.all(files.map(file => {
                    return new Promise((resolve, reject) => {
                        const url = URL.createObjectURL(file);
                        if (file.type.startsWith('video/')) {
                            const video = document.createElement('video');
                            video.src = url;
                            video.muted = true; // 靜音以確保自動載入
                            video.onloadeddata = () => resolve({ type: 'video', el: video, duration: video.duration || 5 });
                            video.onerror = reject;
                        } else {
                            const img = new Image();
                            img.src = url;
                            img.onload = () => resolve({ type: 'image', el: img, duration: 3 }); 
                            img.onerror = reject;
                        }
                    });
                }));
                btnGenerate.classList.remove('hidden');
            } catch (err) {
                errorMsg.textContent = "讀取檔案失敗，請確保檔案格式正確。";
            }
        });

        btnGenerate.addEventListener('click', () => {
            stepUpload.classList.add('hidden');
            stepProcessing.classList.remove('hidden');
            startRecordingAndRendering();
        });

        // 核心：錄製與渲染邏輯
        async function startRecordingAndRendering() {
            // 讀取品牌資訊與音量
            currentCompanyName = document.getElementById('input-company').value.trim() || "宜仁居家有限公司";
            currentPhone = document.getElementById('input-phone').value.trim() || "0919821208";
            const bgmVolume = parseFloat(document.getElementById('bgm-volume').value);

            // === Web Audio API 混音器設置 ===
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const audioDest = audioCtx.createMediaStreamDestination();

            // 處理背景音樂與音量
            if (bgmElement) {
                const bgmSource = audioCtx.createMediaElementSource(bgmElement);
                const gainNode = audioCtx.createGain(); 
                gainNode.gain.value = bgmVolume;        
                bgmSource.connect(gainNode);
                gainNode.connect(audioDest);
                gainNode.connect(audioCtx.destination); // 預覽時播放
                bgmElement.loop = true;
                bgmElement.play();
            }

            // 處理原始影片音效
            mediaElements.forEach(m => {
                if (m.type === 'video' && !m.audioRouted) {
                    const source = audioCtx.createMediaElementSource(m.el);
                    source.connect(audioDest);
                    source.connect(audioCtx.destination); 
                    m.audioRouted = true; 
                    m.el.muted = false; 
                }
            });

            // 設定 MediaRecorder 合併影像與聲音
            const canvasStream = canvas.captureStream(30); 
            const combinedTracks = [...canvasStream.getVideoTracks(), ...audioDest.stream.getAudioTracks()];
            const finalStream = new MediaStream(combinedTracks);
            
            let mimeType = 'video/webm;codecs=vp9,opus';
            if (!MediaRecorder.isTypeSupported(mimeType)) {
                mimeType = 'video/webm;codecs=vp8,opus';
                if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm'; 
            }

            const recorder = new MediaRecorder(finalStream, { mimeType: mimeType });
            const chunks = [];
            recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
            
            recorder.onstop = () => {
                if (bgmElement) bgmElement.pause();
                if (audioCtx && audioCtx.state !== 'closed') audioCtx.close();

                const blob = new Blob(chunks, { type: mimeType });
                const videoUrl = URL.createObjectURL(blob);
                const downloadLink = document.getElementById('download-link');
                downloadLink.href = videoUrl;
                downloadLink.download = `${currentCompanyName}_影片作品集_${new Date().getTime()}.webm`;
                
                stepProcessing.classList.add('hidden');
                stepDownload.classList.remove('hidden');
            };
            
            recorder.start();

            // === 開始 Canvas 動畫排程 ===
            await renderTitleScreen(currentCompanyName, "AI 影像創作集", 2500);
            
            for (let i = 0; i < mediaElements.length; i++) {
                const media = mediaElements[i];
                if (media.type === 'video') media.el.play();
                
                await renderMediaContent(media, media.duration * 1000);
                
                if (media.type === 'video') media.el.pause();

                // 加入 3D 翻書轉場特效
                if (i < mediaElements.length - 1) {
                    await renderTransition(media, mediaElements[i+1], 1200);
                }
            }
            
            await renderTitleScreen("感謝觀看", `指導講師專屬 / TEL: ${currentPhone}`, 3000);
            recorder.stop();
        }

        // ================= 輔助繪製函數 =================
        function wait(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

        async function renderTitleScreen(title, subtitle, durationMs) {
            const start = performance.now();
            return new Promise(resolve => {
                function draw(now) {
                    const progress = now - start;
                    const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                    gradient.addColorStop(0, '#1e3a8a'); 
                    gradient.addColorStop(1, '#2563eb'); 
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    ctx.fillStyle = 'white';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.globalAlpha = Math.min(1, progress / 500);
                    
                    ctx.font = 'bold 70px sans-serif';
                    ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 20);
                    ctx.font = '35px sans-serif';
                    ctx.fillStyle = '#bfdbfe'; 
                    ctx.fillText(subtitle, canvas.width / 2, canvas.height / 2 + 60);
                    
                    ctx.globalAlpha = 1.0;
                    if (progress < durationMs) requestAnimationFrame(draw); else resolve();
                }
                requestAnimationFrame(draw);
            });
        }

        async function renderMediaContent(media, durationMs) {
            const start = performance.now();
            const actualDuration = Math.min(durationMs, 10000); // 限制單一片段最長 10 秒
            return new Promise(resolve => {
                function draw(now) {
                    const progress = now - start;
                    ctx.fillStyle = '#000000';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    drawMediaFitted(media, 0);
                    drawWatermark();
                    if (progress < actualDuration) requestAnimationFrame(draw); else resolve();
                }
                requestAnimationFrame(draw);
            });
        }

        async function renderTransition(media1, media2, durationMs) {
            const start = performance.now();
            return new Promise(resolve => {
                function draw(now) {
                    const progress = now - start;
                    const p = Math.min(1, progress / durationMs);
                    const easeP = 1 - Math.pow(1 - p, 3); // easeOut
                    
                    ctx.fillStyle = '#000000';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    // 底層新頁面
                    drawMediaFitted(media2, 0);

                    // 動態落影
                    const shadowWidth = 200;
                    const shadowX = canvas.width * (1 - easeP); 
                    const dropGrad = ctx.createLinearGradient(shadowX, 0, shadowX + shadowWidth, 0);
                    dropGrad.addColorStop(0, `rgba(0,0,0,${0.6 * (1 - easeP)})`); 
                    dropGrad.addColorStop(1, 'rgba(0,0,0,0)'); 
                    ctx.fillStyle = dropGrad;
                    ctx.fillRect(shadowX, 0, shadowWidth, canvas.height);

                    // 上層舊頁面 3D 翻轉
                    if (easeP < 1) {
                        ctx.save();
                        ctx.translate(0, 0);
                        ctx.scale(1 - easeP, 1);
                        drawMediaFitted(media1, 0);

                        ctx.fillStyle = `rgba(0,0,0,${easeP * 0.8})`;
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        
                        const edgeGrad = ctx.createLinearGradient(canvas.width - 60, 0, canvas.width, 0);
                        edgeGrad.addColorStop(0, 'rgba(255,255,255,0)');
                        edgeGrad.addColorStop(1, `rgba(255,255,255,${0.4 * (1 - easeP)})`);
                        ctx.fillStyle = edgeGrad;
                        ctx.fillRect(canvas.width - 60, 0, 60, canvas.height);

                        const bindGrad = ctx.createLinearGradient(0, 0, 80, 0);
                        bindGrad.addColorStop(0, 'rgba(0,0,0,0.6)');
                        bindGrad.addColorStop(1, 'rgba(0,0,0,0)');
                        ctx.fillStyle = bindGrad;
                        ctx.fillRect(0, 0, 80, canvas.height);
                        ctx.restore();
                    }

                    drawWatermark();
                    if (progress < durationMs) requestAnimationFrame(draw); else resolve();
                }
                requestAnimationFrame(draw);
            });
        }

        function drawMediaFitted(media, offsetX) {
            const imgW = media.type === 'video' ? media.el.videoWidth : media.el.width;
            const imgH = media.type === 'video' ? media.el.videoHeight : media.el.height;
            const ratio = Math.min(canvas.width / imgW, canvas.height / imgH);
            const drawW = imgW * ratio;
            const drawH = imgH * ratio;
            const drawX = offsetX + (canvas.width - drawW) / 2;
            const drawY = (canvas.height - drawH) / 2;
            ctx.drawImage(media.el, drawX, drawY, drawW, drawH);
        }

        function drawWatermark() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.font = '24px sans-serif';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'bottom';
            ctx.fillText(`${currentCompanyName} AI 影片生成`, canvas.width - 20, canvas.height - 20);
        }
    </script>
</body>
</html>
